name: true_capture_app
description: "True Capture mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.0

  # Models / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.1

  # Messaging — realtime, local notifications, media compression
  signalr_netcore: ^1.3.7
  flutter_local_notifications: ^17.2.3
  flutter_image_compress: ^2.3.0
  video_compress: ^3.1.3

  # Auth
  local_auth: ^2.2.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  flutter_facebook_auth: ^7.0.0

  # UI / animation
  flutter_animate: ^4.5.0

  # Utilities
  image_picker: ^1.1.2
  share_plus: ^10.0.0
  timezone: ^0.9.4
  intl: ^0.20.2
  permission_handler: ^11.3.1
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/png/
    - assets/images/svg/
